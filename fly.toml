# Fly.io Configuration for EU Compliance Suite 2026
app = "eu-label-manager"
primary_region = "fra"

[build]
  dockerfile = "Dockerfile"

[env]
  NODE_ENV = "production"
  # Shopify credentials - set via fly secrets
  # SHOPIFY_API_KEY = ""
  # SHOPIFY_API_SECRET = ""
  # SHOPIFY_SCOPES = "read_products,write_products,read_orders,write_metafields"
  # SHOPIFY_APP_URL = ""
  # EMAIL_SMTP_HOST = ""
  # EMAIL_SMTP_PORT = "587"
  # EMAIL_SMTP_SECURE = "0"
  # EMAIL_SMTP_USER = ""
  # EMAIL_SMTP_PASS = ""
  # EMAIL_FROM = ""

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1

[mounts]
  source = "app_data"
  destination = "/data"

[metrics]
  port = 9091
  path = "/metrics"