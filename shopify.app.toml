name = "EU Compliance Suite 2026"
uuid = "xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx" # You would generate a unique UUID
api_version = "2023-10"
auth_destination = "embed"

[[scopes]]
  handle = "read_products"
[[scopes]]
  handle = "write_products"
[[scopes]]
  handle = "read_orders"
[[scopes]]
  handle = "write_metafields"

[webhooks]
  [webhooks.customers_data_request]
    address = "/webhooks/customers_data_request"
    format = "json"
  [webhooks.customers_redact]
    address = "/webhooks/customers_redact"
    format = "json"
  [webhooks.shop_redact]
    address = "/webhooks/shop_redact"
    format = "json"

[proxy]
  prefix = "/apps/eu-compliance-suite-2026"
  destination = "/app"
  # This will proxy requests from the shop's domain at /apps/eu-compliance-suite-2026 to our app's /app directory
  # So our API endpoint at /app/routes/api.withdrawal-submit.jsx becomes accessible at /apps/eu-compliance-suite-2026/api/withdrawal-submit

[[embed]]
  # Embedded app settings
  type = "embedded_app"
  url = "/app"

[batch]
  size = 50

[api_client]
  # API client credentials are stored in environment variables or .env file
  # These are set during app deployment
  # api_key = "..."
  # secret = "..."